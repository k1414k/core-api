# Active Storage のファイル保存先設定
# RAILS_ENV=development → local（ローカルディスク）
# RAILS_ENV=production  → amazon（AWS S3）

test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>   # テスト時は一時ディレクトリに保存

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>       # 開発時はプロジェクト内のstorageフォルダに保存

# 本番環境：AWS S3に保存
# 環境変数からアクセスキーを読み込む（.env.productionに記載）
# Rails.env.production? 以外では ENV.fetch を使わず、ENV[] による参照のみにして
# ローカル開発で AWS_* が未設定でも KeyError にならないようにする。
amazon:
  service: S3
  access_key_id:     <%= Rails.env.production? ? ENV.fetch("AWS_ACCESS_KEY_ID") : ENV["AWS_ACCESS_KEY_ID"] %>       # IAMユーザーのアクセスキー
  secret_access_key: <%= Rails.env.production? ? ENV.fetch("AWS_SECRET_ACCESS_KEY") : ENV["AWS_SECRET_ACCESS_KEY"] %>   # IAMユーザーのシークレットキー
  region:            <%= ENV.fetch("AWS_REGION", "ap-northeast-1") %>  # 東京リージョン
  bucket:            <%= Rails.env.production? ? ENV.fetch("S3_BUCKET_NAME") : ENV["S3_BUCKET_NAME"] %>          # S3バケット名